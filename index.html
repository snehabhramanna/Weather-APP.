





<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Weather App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
transition:0.4s;
overflow:hidden;
}

.container{
width:360px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
color:white;
text-align:center;
z-index:10;
}

h1{
margin-bottom:10px;
}

.search{
display:flex;
gap:10px;
margin-bottom:15px;
}

.search input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
outline:none;
}

.search button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.icon{
width:90px;
}

.temp{
font-size:48px;
margin:5px 0;
}

.desc{
text-transform:capitalize;
}

.details{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.box{
background:rgba(255,255,255,0.2);
padding:10px;
border-radius:10px;
width:30%;
}

.forecast{
display:flex;
justify-content:space-between;
margin-top:15px;
}

.day{
background:rgba(255,255,255,0.2);
padding:8px;
border-radius:10px;
width:18%;
font-size:12px;
}

.day img{
width:40px;
}

.toggle{
margin-top:15px;
cursor:pointer;
}

.dark{
background:#111;
}

/* RAIN */

#rain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
display:none;
}

.raindrop{
position:absolute;
width:2px;
height:15px;
background:white;
animation:rainFall 0.7s linear infinite;
opacity:0.6;
}

@keyframes rainFall{
0%{transform:translateY(-100px);}
100%{transform:translateY(100vh);}
}

/* SNOW */

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
display:none;
}

.snowflake{
position:absolute;
color:white;
font-size:18px;
animation:snowFall 6s linear infinite;
}

@keyframes snowFall{
0%{transform:translateY(-50px);}
100%{transform:translateY(100vh);}
}

/* SUN */

#sun{
position:fixed;
top:80px;
right:80px;
width:120px;
height:120px;
background:radial-gradient(circle,#FFD93B,#FFA500);
border-radius:50%;
box-shadow:0 0 80px #FFD93B;
display:none;
animation:sunGlow 3s ease-in-out infinite alternate;
}

@keyframes sunGlow{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

</style>
</head>

<body>

<div id="rain"></div>
<div id="snow"></div>
<div id="sun"></div>

<div class="container">

<h1>Weather App</h1>

<div class="search">
<input id="city" placeholder="Enter city name">
<button onclick="getWeather()">Search</button>
</div>

<h2 id="cityName"></h2>

<img id="icon" class="icon">

<div class="temp" id="temp">--°C</div>

<div class="desc" id="desc"></div>

<div class="details">

<div class="box">
<p>Humidity</p>
<h3 id="humidity"></h3>
</div>

<div class="box">
<p>Wind</p>
<h3 id="wind"></h3>
</div>

<div class="box">
<p>Feels</p>
<h3 id="feels"></h3>
</div>

</div>

<h3 style="margin-top:15px;">5 Day Forecast</h3>

<div class="forecast" id="forecast"></div>

<div class="toggle" onclick="toggleTheme()">🌙 Toggle Dark / Light</div>

</div>

<script>

const apiKey="92a8b1733403f5452f781200db8f59de";

async function getWeather(){

const city=document.getElementById("city").value;

const url=`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;

const data=await fetch(url).then(res=>res.json());

document.getElementById("cityName").innerText=data.name;

document.getElementById("temp").innerText=Math.round(data.main.temp)+"°C";

document.getElementById("desc").innerText=data.weather[0].description;

document.getElementById("humidity").innerText=data.main.humidity+"%";

document.getElementById("wind").innerText=data.wind.speed+" km/h";

document.getElementById("feels").innerText=Math.round(data.main.feels_like)+"°C";

document.getElementById("icon").src=
`https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png`;

showWeatherAnimation(data.weather[0].main);

getForecast(city);

}

async function getForecast(city){

const url=`https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${apiKey}`;

const data=await fetch(url).then(res=>res.json());

const forecast=document.getElementById("forecast");

forecast.innerHTML="";

for(let i=0;i<5;i++){

const item=data.list[i*8];

const day=document.createElement("div");

day.className="day";

day.innerHTML=`
<p>${new Date(item.dt_txt).toLocaleDateString("en",{weekday:"short"})}</p>
<img src="https://openweathermap.org/img/wn/${item.weather[0].icon}.png">
<p>${Math.round(item.main.temp)}°C</p>
`;

forecast.appendChild(day);

}

}

function toggleTheme(){

document.body.classList.toggle("dark");

}

function showWeatherAnimation(weather){

document.getElementById("rain").style.display="none";
document.getElementById("snow").style.display="none";
document.getElementById("sun").style.display="none";

if(weather==="Rain"){

const rain=document.getElementById("rain");
rain.style.display="block";
rain.innerHTML="";

for(let i=0;i<120;i++){

const drop=document.createElement("div");
drop.className="raindrop";

drop.style.left=Math.random()*100+"vw";
drop.style.animationDuration=(0.5+Math.random())+"s";

rain.appendChild(drop);

}

}

else if(weather==="Snow"){

const snow=document.getElementById("snow");
snow.style.display="block";
snow.innerHTML="";

for(let i=0;i<60;i++){

const flake=document.createElement("div");
flake.className="snowflake";
flake.innerHTML="❄";

flake.style.left=Math.random()*100+"vw";
flake.style.animationDuration=(4+Math.random()*3)+"s";

snow.appendChild(flake);

}

}

else if(weather==="Clear"){

document.getElementById("sun").style.display="block";

}

}

</script>

</body>
</html>
